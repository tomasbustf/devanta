<section id="contacto">
  <div class="bg-glow"></div>
  <div class="container">
    <div class="layout">
      <!-- Info -->
      <div class="info reveal">
        <div class="section-tag">Contacto</div>
        <h2 class="section-title">Construyamos<br><span class="accent">algo juntos</span></h2>
        <p>Cuéntanos sobre tu proyecto. Respondemos en menos de 24 horas con un primer análisis sin costo ni compromiso.
        </p>

        <div class="details">
          <div class="item">
            <div class="icon">✉</div>
            <div>
              <div class="label">Email</div>
              <div class="val">figueroabustostomas&#64;gmail.com</div>
            </div>
          </div>
          <div class="item">
            <div class="icon">📱</div>
            <div>
              <div class="label">WhatsApp</div>
              <div class="val">+569 93737229</div>
            </div>
          </div>
          <div class="item">
            <div class="icon">🕐</div>
            <div>
              <div class="label">Horario</div>
              <div class="val">Atención 24/7</div>
            </div>
          </div>
          <div class="item">
            <a href="https://instagram.com/devanta.cl" target="_blank" class="icon"
              style="color: inherit; text-decoration: none;">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
              </svg>
            </a>
            <div>
              <div class="label">Instagram</div>
              <div class="val">
                <a href="https://instagram.com/devanta.cl" target="_blank"
                  style="color: inherit; text-decoration: none;">devanta.cl</a>
              </div>
            </div>
          </div>
        </div>


      </div>

      <!-- Form -->
      <div class="form-wrap reveal">
        <div class="row2">
          <div class="fg">
            <label>Nombre</label>
            <input type="text" [(ngModel)]="form.name" placeholder="Tu nombre">
          </div>
          <div class="fg">
            <label>Empresa</label>
            <input type="text" [(ngModel)]="form.company" placeholder="Nombre de tu empresa">
          </div>
        </div>
        <div class="fg">
          <label>Email</label>
          <input type="email" [(ngModel)]="form.email" placeholder="tu@empresa.com">
        </div>


        <div class="fg">
          <label>Cuéntanos tu proyecto</label>
          <textarea [(ngModel)]="form.message" rows="4"
            placeholder="Describe brevemente qué quieres construir y en qué etapa estás..."></textarea>
        </div>
        <button class="submit" (click)="send()" [class.done]="submitted" [disabled]="isLoading">
          <ng-container *ngIf="!isLoading && !submitted">Enviar mensaje →</ng-container>
          <ng-container *ngIf="isLoading">Enviando...</ng-container>
          <ng-container *ngIf="submitted">✓ Mensaje enviado</ng-container>
        </button>
      </div>
    </div>
  </div>
</section>
