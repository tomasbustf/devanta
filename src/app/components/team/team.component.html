<section id="equipo">
  <div class="container">
    <div class="header reveal">
      <div>
        <div class="section-tag">Equipo</div>
        <h2 class="section-title">Las personas<br><span class="accent">detrás del código</span></h2>
      </div>
      <!-- <p class="section-sub">Ingenieros, diseñadores y estrategas que se toman en serio cada proyecto. Sin juniors, sin
        outsourcing oculto.</p> -->
    </div>

    <div class="grid reveal">
      <div class="card" *ngFor="let m of members">
        <div class="avatar" [style.background]="m.imageUrl ? 'none' : m.gradient">
          <img *ngIf="m.imageUrl" [src]="m.imageUrl" [alt]="m.name" class="avatar-img" />
          <span *ngIf="!m.imageUrl">{{ m.initials }}</span>
        </div>
        <div class="info">
          <div class="name">{{ m.name }}</div>
          <div class="role">{{ m.role }}</div>
          <div class="bio">{{ m.bio }}</div>
          <div class="social-links">
            <a *ngIf="m.instagram" [href]="m.instagram" target="_blank" aria-label="Instagram">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
              </svg>
            </a>
            <a *ngIf="m.github" [href]="m.github" target="_blank" aria-label="GitHub">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path
                  d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22">
                </path>
              </svg>
            </a>
            <a *ngIf="m.linkedin" [href]="m.linkedin" target="_blank" aria-label="LinkedIn">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>
                <rect x="2" y="9" width="4" height="12"></rect>
                <circle cx="4" cy="4" r="2"></circle>
              </svg>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
